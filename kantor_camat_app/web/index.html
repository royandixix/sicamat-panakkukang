<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SICAMAT - Sistem Informasi dan Layanan Online Kantor Camat Panakkukang.">
  <meta name="theme-color" content="#075E54">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SICAMAT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>SICAMAT Panakkukang</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f4f7f6;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #sicamat-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #ffffff;
      background: linear-gradient(135deg, #033f38 0%, #075e54 52%, #0a7a69 100%);
      transition: opacity .35s ease, visibility .35s ease;
      pointer-events: none;
    }

    #sicamat-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    #sicamat-loader::before,
    #sicamat-loader::after {
      content: "";
      position: absolute;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      background: rgba(255,255,255,.045);
    }

    #sicamat-loader::before { right: -170px; top: -210px; }
    #sicamat-loader::after { left: -190px; bottom: -250px; width: 520px; height: 520px; }

    .loader-card {
      position: relative;
      z-index: 2;
      width: min(420px, calc(100vw - 44px));
      text-align: center;
    }

    .loader-logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 26px;
      background: rgba(255,255,255,.11);
      box-shadow: 0 18px 50px rgba(0,0,0,.16);
      font-size: 39px;
    }

    .loader-title {
      margin: 0;
      font-size: 31px;
      font-weight: 900;
      letter-spacing: 5px;
    }

    .loader-subtitle {
      margin: 10px 0 25px;
      color: rgba(255,255,255,.66);
      font-size: 13px;
      line-height: 1.55;
    }

    .loader-progress {
      width: 210px;
      height: 4px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255,255,255,.16);
    }

    .loader-progress span {
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: #ffffff;
      animation: loading 1.25s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-110%); }
      50% { transform: translateX(120%); }
      100% { transform: translateX(340%); }
    }
  </style>
</head>
<body>
  <div id="sicamat-loader" aria-label="Memuat SICAMAT">
    <div class="loader-card">
      <div class="loader-logo">🏛️</div>
      <h1 class="loader-title">SICAMAT</h1>
      <p class="loader-subtitle">Menyiapkan layanan digital Kecamatan Panakkukang</p>
      <div class="loader-progress"><span></span></div>
    </div>
  </div>

  <script>
    const hideSicamatLoader = () => {
      const loader = document.getElementById('sicamat-loader');
      if (!loader) return;
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 450);
    };

    window.addEventListener('flutter-first-frame', hideSicamatLoader);
    window.setTimeout(hideSicamatLoader, 45000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
